-   name: ComboBox
    group: Button-like Elements
    description: A button with a dropdown that allows selecting one of several options.

    type: ComboBox
    states:
    -   Hovered
    -   ActiveFocus
    -   VisualFocus
    -   Pressed
    -   Enabled
    -   Highlighted
    hints:
        flat: Set whenever the combobox should use a flat appearance.
        editable: Set whenever the combobox is user-editable and should display that.
        changed: Set whenever the combobox should visualize a changed state.

    subelements:
    -   name: Icon
        description: |
            The icon displayed by the button. Style it using the icon related
            properties.
    -   name: Text
        description: |
            The text displayed by the button. Style it using the text related
            properties.
    -   name: Indicator
        description: |
            An icon used to indicate that this is a combobox. Should use a down
            arrow icon or similar.
        type: Indicator
    -   name: Popup
        description: |
            The dropdown displayed by the combobox.

            \note This subelement is not a descendant of the combobox, so you
            cannot target it with child or descrendant selectors. Instead, use
            the type and "combobox" hint to target the popup.

        type: Popup
        hints:
            combobox: Used to indicate that this is a combobox popup.

    -   name: Delegate
        description: |
            The combobox has a delegate that is used by the dropdown. By default
            this delegate will be an ItemDelegate but it may be overridden by
            applications.

