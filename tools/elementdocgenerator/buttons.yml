# Element reference for button-like elements

-   name: Button
    group: Button-like Elements
    description: A Button.

    type: Button
    states:
    -   Hovered
    -   ActiveFocus
    -   VisualFocus
    -   Pressed
    -   Checked
    -   Enabled
    -   Highlighted
    hints:
        with-icon: Set whenever the button has an icon set.
        flat: Set whenever the button should use a flat appearance.
        with-menu: Set whenever the button has a menu attached to it.
        changed: Set whenever the button should visualize a changed state.
    attributes:
        display:
            description: A hint indicating what sub-controls should be visible.
            values:
                icon-only: Only display the icon.
                text-only: Only display the text.
                text-beside-icon: Display both icon and text in a row.
                text-below-icon: Display both icon and text with the text below the icon.
    subelements:
    -   name: Icon
        description: |
            The icon displayed by the button. Style it using the icon related
            properties.
    -   name: Text
        description: |
            The text displayed by the button. Style it using the text related
            properties.
    -   name: Indicator
        description: |
            An extra icon that indicates something about the button. By default
            used to add a down-arrow icon when \c{with-menu} is set.
        type: Indicator

