# Element reference for text elements

-   name: Label
    group: Text Elements
    description: A simple text label.

    type: Label
    states:
    -   Enabled

-   name: TextField
    group: Text Elements
    description: A single-line input field for text.

    type: TextField
    states:
    -   Hovered
    -   ActiveFocus
    -   VisualFocus
    -   Enabled
    hints:
        changed: Set whenever the element should visualize a changed state.
    subelements:
    -   name: Text
        description: |
            The text displayed by the element. Style it using the text related
            properties.
    -   name: Placeholder
        description: |
            The text displayed when there is no input. It serves as a hint for
            what kind of input is accepted. Generally displayed in a muted style.
        hints:
            placeholder: Indicates this is the element's placeholder text.

-   name: TextField
    group: Text Elements
    description: A single-line input field for text.

    type: TextField
    states:
    -   Hovered
    -   ActiveFocus
