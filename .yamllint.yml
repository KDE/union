extends: default

ignore-from-file:
  - .gitignore
  - .yamlignore

rules:
  # don't require a document start marker
  document-start: disable
  # allow longer lines; warn about even longer ones
  line-length:
    max: 120
    level: warning
  indentation: disable
  hyphens: disable
  brackets: disable
  anchors:
    forbid-undeclared-aliases: false
  new-line-at-end-of-file: disable